apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: mock-jolokia
  namespace: artemis-handbrake-test
spec:
  failedBuildsHistoryLimit: 2
  successfulBuildsHistoryLimit: 2
  source:
    type: Binary
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Dockerfile.mock
  output:
    to:
      kind: ImageStreamTag
      name: mock-jolokia:latest
